<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Golfklúbbur Brautarholt — Kjalarnes, Iceland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080A0B;--ink2:#111518;--ink3:#1A2023;
  --ocean:#17323E;--ocean2:#0D2028;
  --lichen:#4E5E44;
  --sand:#C4AE7E;--sand2:#D9C9A3;--sandglow:rgba(196,174,126,.18);
  --bone:#EDE8DF;--bone2:#D6D0C4;--bone3:#AEA898;
  --line:rgba(237,232,223,.1);--line2:rgba(237,232,223,.22);
  --muted:rgba(237,232,223,.5);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--ink);color:var(--bone);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none}
::selection{background:var(--sand);color:var(--ink)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:none;border:none;background:none;color:inherit}

/* SCROLL PROGRESS */
#progress{position:fixed;top:0;left:0;height:1px;background:var(--sand);z-index:200;width:0%;transition:width .05s linear}

/* CURSOR */
#cur-dot{position:fixed;width:6px;height:6px;background:var(--sand);border-radius:50%;pointer-events:none;z-index:999;transform:translate(-50%,-50%);transition:transform .08s,opacity .3s}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(196,174,126,.7);border-radius:50%;pointer-events:none;z-index:998;transform:translate(-50%,-50%);transition:width .4s cubic-bezier(.2,.8,.2,1),height .4s cubic-bezier(.2,.8,.2,1),border-color .4s,opacity .3s;will-change:left,top}
body:has(a:hover) #cur-ring, body:has(button:hover) #cur-ring{width:60px;height:60px;border-color:var(--sand)}
body:has(.btn-book:hover) #cur-ring{width:80px;height:80px;border-color:var(--sand);background:rgba(196,174,126,.08)}

/* NAV */
nav{position:fixed;inset:0 0 auto;z-index:100;transition:background .6s,border-color .6s;border-bottom:1px solid transparent;height:72px;display:flex;align-items:center}
nav.scrolled{background:rgba(8,10,11,.82);backdrop-filter:blur(18px) saturate(160%);border-bottom-color:var(--line)}
.nav-inner{width:100%;max-width:1440px;margin:0 auto;padding:0 clamp(20px,4vw,60px);display:flex;align-items:center;justify-content:space-between}
.wordmark{font-family:var(--serif);font-size:20px;letter-spacing:.04em;color:var(--bone)}
.wordmark span{font-style:italic;color:var(--sand)}
.nav-links{display:flex;gap:36px}
@media(max-width:900px){.nav-links{display:none}}
.nav-links a{font-size:12px;letter-spacing:.08em;color:var(--muted);transition:color .3s;position:relative}
.nav-links a:hover{color:var(--bone)}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--sand);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.nav-links a:hover::after{transform:scaleX(1)}
.btn-book{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--sand);color:var(--sand);background:transparent;transition:all .4s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
.btn-book::before{content:'';position:absolute;inset:0;background:var(--sand);transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.2,.8,.2,1);z-index:-1}
.btn-book:hover{color:var(--ink)}
.btn-book:hover::before{transform:scaleX(1)}

/* HERO */
.hero{height:100svh;min-height:700px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.hero-img{position:absolute;inset:0;z-index:0}
.hero-img img{width:100%;height:100%;object-fit:cover;object-position:center 40%;will-change:transform}
.hero-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,11,.35) 0%,rgba(8,10,11,.05) 35%,rgba(8,10,11,.2) 55%,rgba(8,10,11,.95) 100%),linear-gradient(90deg,rgba(8,10,11,.5) 0%,transparent 60%)}
.hero-content{position:relative;z-index:2;width:100%;padding:0 clamp(20px,4vw,60px) clamp(60px,9vh,120px);max-width:1440px;margin:0 auto}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.35em;color:var(--sand);text-transform:uppercase;margin-bottom:28px;overflow:hidden;display:block}
.hero-tag span{display:inline-block;opacity:0;transform:translateY(100%);animation:slideUp .8s cubic-bezier(.2,.8,.2,1) .2s forwards}
.hero h1{font-family:var(--serif);font-weight:300;font-size:clamp(52px,9.5vw,168px);line-height:.92;letter-spacing:-.01em;margin-bottom:36px;overflow:hidden}
.hero h1 .word{display:inline-block;overflow:hidden;margin-right:.22em}
.hero h1 .word .inner{display:inline-block;opacity:0;transform:translateY(110%);animation:slideUp 1s cubic-bezier(.2,.8,.2,1) forwards}
.hero h1 .word:nth-child(1) .inner{animation-delay:.35s}
.hero h1 .word:nth-child(2) .inner{animation-delay:.5s}
.hero h1 .word:nth-child(3) .inner{animation-delay:.62s}
.hero h1 .word:nth-child(4) .inner{animation-delay:.72s}
.hero h1 .word:nth-child(5) .inner{animation-delay:.8s}
.hero h1 em{font-style:italic;color:var(--sand)}
.hero-sub{font-family:var(--serif);font-size:clamp(18px,1.8vw,24px);color:var(--bone2);font-weight:300;line-height:1.5;max-width:600px;margin-bottom:48px;opacity:0;animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) 1s forwards}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) 1.15s forwards}
.btn-primary{display:inline-flex;align-items:center;gap:12px;padding:16px 28px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;background:var(--sand);color:var(--ink);font-weight:500;transition:all .4s cubic-bezier(.2,.8,.2,1)}
.btn-primary:hover{background:var(--bone);transform:translateX(3px)}
.btn-ghost{display:inline-flex;align-items:center;gap:12px;padding:16px 28px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;border:1px solid var(--line2);color:var(--bone);transition:all .4s}
.btn-ghost:hover{border-color:var(--sand);color:var(--sand)}
.arr{display:inline-block;width:20px;height:1px;background:currentColor;position:relative}
.arr::after{content:'';position:absolute;right:-1px;top:-3px;width:7px;height:7px;border-top:1px solid currentColor;border-right:1px solid currentColor;transform:rotate(45deg)}
.hero-stats{position:absolute;right:clamp(20px,4vw,60px);bottom:clamp(60px,9vh,120px);z-index:3;display:flex;flex-direction:column;gap:24px;text-align:right;opacity:0;animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) 1.3s forwards}
@media(max-width:1000px){.hero-stats{display:none}}
.hero-stat .n{font-family:var(--serif);font-size:56px;line-height:1;font-style:italic;color:var(--sand)}
.hero-stat .l{font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.hero-scroll{position:absolute;bottom:clamp(24px,4vh,48px);left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadeUp .9s ease 1.5s forwards}
.scroll-line{width:1px;height:48px;background:linear-gradient(180deg,var(--sand),transparent);animation:scrollPulse 2s ease-in-out infinite}

@keyframes slideUp{to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes scrollPulse{0%,100%{opacity:.5;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.2)}}

/* MARQUEE */
.marquee{overflow:hidden;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--ink2)}
.mq-track{display:flex;gap:72px;width:max-content;white-space:nowrap;animation:mq 36s linear infinite}
.mq-track span{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;display:inline-flex;align-items:center;gap:16px}
.mq-track span::before{content:'✦';color:var(--sand);font-size:8px}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SHARED */
.wrap{max-width:1440px;margin:0 auto;padding:0 clamp(20px,4vw,60px)}
.sec-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.36em;color:var(--sand);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sec-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--sand)}
.sec-title{font-family:var(--serif);font-weight:300;font-size:clamp(44px,6vw,96px);line-height:.95;letter-spacing:-.01em}
.sec-title em{font-style:italic;color:var(--sand)}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.2,.8,.2,1),transform 1s cubic-bezier(.2,.8,.2,1)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

/* PHOTO FULL BLEED */
.photo-banner{height:70vh;min-height:480px;position:relative;overflow:hidden}
.photo-banner img{width:100%;height:130%;object-fit:cover;object-position:center 20%;will-change:transform}
.photo-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,11,.5) 0%,rgba(8,10,11,.0) 30%,rgba(8,10,11,.6) 100%)}
.photo-overlay-text{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(40px,6vw,80px)}
.photo-overlay-text h2{font-family:var(--serif);font-weight:300;font-size:clamp(44px,7vw,100px);line-height:.95;letter-spacing:-.01em;color:var(--bone);max-width:800px}
.photo-overlay-text h2 em{font-style:italic;color:var(--sand)}
.photo-overlay-text p{font-family:var(--serif);font-size:clamp(18px,1.8vw,22px);color:var(--bone2);font-weight:300;max-width:520px;line-height:1.5;margin-top:20px}

/* ABOUT */
.about{padding:clamp(120px,16vh,200px) 0}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,6vw,120px);align-items:start}
@media(max-width:1000px){.about-grid{grid-template-columns:1fr}}
.about-body p{font-family:var(--serif);font-size:clamp(20px,2vw,26px);line-height:1.5;color:var(--bone);font-weight:300;margin-bottom:24px}
.about-body p:last-child{color:var(--bone2);font-size:clamp(16px,1.6vw,20px)}
.about-meta{margin-top:48px;border-top:1px solid var(--line)}
.meta-row{display:grid;grid-template-columns:120px 1fr;gap:20px;padding:18px 0;border-bottom:1px solid var(--line);align-items:baseline}
.meta-row .k{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--sand);text-transform:uppercase}
.meta-row .v{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--bone)}
.meta-row .v small{display:block;font-family:var(--sans);font-size:12px;color:var(--muted);margin-top:3px}
.about-img{position:sticky;top:100px}
.about-img img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.about-img-caption{padding:14px 0;font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line)}

/* ARCHITECTS */
.arch{padding:0 0 clamp(100px,14vh,180px)}
.arch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);margin-top:60px}
@media(max-width:800px){.arch-grid{grid-template-columns:1fr}}
.arch-card{background:var(--ink);padding:44px 36px;transition:background .5s}
.arch-card:hover{background:var(--ink2)}
.arch-no{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--sand);margin-bottom:28px}
.arch-name{font-family:var(--serif);font-size:38px;font-weight:300;line-height:1.05;margin-bottom:12px}
.arch-name em{font-style:italic}
.arch-desc{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}

/* AWARDS — full drama */
.awards{padding:clamp(140px,18vh,240px) 0;background:var(--ink2);overflow:hidden;position:relative}
.awards::before{content:'';position:absolute;inset:0;background:radial-gradient(60% 50% at 50% 0%,rgba(196,174,126,.08),transparent 70%)}
.awards-intro{text-align:center;margin-bottom:clamp(80px,12vh,160px)}
.awards-intro .sec-title{margin-top:16px}
.awards-duo{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
@media(max-width:800px){.awards-duo{grid-template-columns:1fr}}
.award-card{background:var(--ink2);padding:clamp(60px,8vw,100px) clamp(40px,6vw,80px);text-align:center;position:relative;overflow:hidden;transition:background .6s}
.award-card:hover{background:var(--ink3)}
.award-src{font-family:var(--mono);font-size:10px;letter-spacing:.36em;color:var(--sand);text-transform:uppercase;margin-bottom:40px}
.award-num{font-family:var(--serif);font-style:italic;font-size:clamp(160px,22vw,280px);line-height:.8;color:var(--bone);letter-spacing:-.04em;display:block;transition:color .4s}
.award-card:hover .award-num{color:var(--sand)}
.award-denom{font-family:var(--serif);font-size:clamp(22px,2.4vw,32px);font-weight:300;color:var(--bone2);line-height:1.3;margin-top:32px;max-width:360px;margin-left:auto;margin-right:auto}
.award-denom em{font-style:italic;color:var(--sand)}
.award-foot{margin-top:48px;padding-top:20px;border-top:1px solid var(--line);font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}

/* GALLERY — horizontal cinematic */
.gallery-section{padding:clamp(100px,14vh,180px) 0}
.gallery-head{margin-bottom:60px}
.gallery-track{display:flex;gap:24px;overflow-x:auto;padding:0 clamp(20px,4vw,60px) 40px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.gallery-track::-webkit-scrollbar{display:none}
.gallery-item{flex:0 0 auto;scroll-snap-align:start;position:relative;overflow:hidden}
.gallery-item:nth-child(1){width:clamp(320px,55vw,780px);aspect-ratio:16/10}
.gallery-item:nth-child(2){width:clamp(260px,40vw,580px);aspect-ratio:3/4}
.gallery-item:nth-child(3){width:clamp(280px,45vw,640px);aspect-ratio:16/10}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .8s cubic-bezier(.2,.8,.2,1)}
.gallery-item:hover img{transform:scale(1.04)}
.gallery-item .gi-cap{position:absolute;bottom:0;left:0;right:0;padding:24px 24px 20px;background:linear-gradient(0deg,rgba(8,10,11,.85),transparent);font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--bone2);text-transform:uppercase}
.gallery-item .gi-idx{position:absolute;top:18px;right:18px;font-family:var(--mono);font-size:10px;color:var(--sand);letter-spacing:.2em}
/* SVG placeholder gallery item */
.gi-ph{width:100%;height:100%;background:#0a1218;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gi-ph::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(196,174,126,.03) 0 2px,transparent 2px 14px),radial-gradient(80% 60% at 50% 30%,rgba(31,58,68,.5),transparent 70%)}
.gi-ph-text{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;z-index:1;text-align:center;padding:20px}

/* LOCATION */
.location{padding:clamp(100px,14vh,180px) 0;border-top:1px solid var(--line)}
.loc-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:clamp(60px,8vw,120px);align-items:center}
@media(max-width:960px){.loc-grid{grid-template-columns:1fr}}
.loc-headline{font-family:var(--serif);font-weight:300;font-size:clamp(32px,3.5vw,52px);line-height:1.15;color:var(--bone);margin:20px 0 28px}
.loc-headline em{font-style:italic;color:var(--sand)}
.loc-body{font-size:15px;line-height:1.8;color:var(--bone2);font-weight:300}
.loc-detail{margin-top:36px;padding:20px 24px;border:1px solid var(--line2);background:var(--ink2)}
.loc-detail .lk{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--sand);margin-bottom:10px;text-transform:uppercase}
.loc-detail .lv{font-size:14px;color:var(--bone);line-height:1.7}
/* map */
.loc-map{aspect-ratio:4/5;background:#070f15;border:1px solid var(--line2);position:relative;overflow:hidden}
.loc-map svg{width:100%;height:100%}
.map-compass{position:absolute;top:16px;right:16px;width:44px;height:44px;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:11px;color:var(--sand)}
.map-legend{position:absolute;bottom:16px;left:16px;font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.map-legend b{color:var(--sand);font-weight:500;display:block;margin-bottom:4px}

/* MIDNIGHT */
.midnight{padding:clamp(140px,18vh,240px) 0;background:#03050C;position:relative;overflow:hidden}
.aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.aurora-band{position:absolute;left:-20%;right:-20%;height:300px;border-radius:50%;filter:blur(60px);mix-blend-mode:screen;opacity:.5;animation:auroraFlow 12s ease-in-out infinite alternate}
.aurora-band:nth-child(1){top:5%;background:linear-gradient(180deg,rgba(0,255,160,.3),transparent);animation-delay:0s;animation-duration:11s}
.aurora-band:nth-child(2){top:15%;background:linear-gradient(180deg,rgba(80,200,255,.2),transparent);animation-delay:2s;animation-duration:14s}
.aurora-band:nth-child(3){top:0;background:linear-gradient(180deg,rgba(120,80,255,.2),transparent);animation-delay:4s;animation-duration:9s}
@keyframes auroraFlow{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(4%) scaleY(1.3)}100%{transform:translateX(8%) scaleY(.9)}}
.mid-stars{position:absolute;inset:0;z-index:0}
.midnight-content{position:relative;z-index:2}
.mid-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(60px,8vw,120px);align-items:center}
@media(max-width:960px){.mid-grid{grid-template-columns:1fr}}
.mid-tag{font-family:var(--mono);font-size:10px;letter-spacing:.36em;color:#7AF0B0;text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.mid-tag::before{content:'';display:block;width:24px;height:1px;background:#7AF0B0}
.mid-h{font-family:var(--serif);font-weight:300;font-size:clamp(52px,8vw,120px);line-height:.92;letter-spacing:-.01em;margin-bottom:32px;color:var(--bone)}
.mid-h em{font-style:italic;color:#7AF0B0}
.mid-sub{font-family:var(--serif);font-size:clamp(18px,1.8vw,24px);color:var(--bone2);font-weight:300;line-height:1.5;margin-bottom:40px}
.mid-facts{display:grid;gap:0;border-top:1px solid rgba(122,240,176,.15)}
.mid-fact{display:grid;grid-template-columns:28px 1fr;gap:16px;padding:18px 0;border-bottom:1px solid rgba(122,240,176,.12);font-size:14px;color:var(--bone2);line-height:1.6;font-weight:300;align-items:start}
.mid-fact .idx{font-family:var(--mono);font-size:9px;color:#7AF0B0;letter-spacing:.2em;padding-top:2px}
.mid-fact b{color:var(--bone);font-weight:500}
.sun-diagram{display:flex;align-items:center;justify-content:center}
.sun-diagram svg{width:min(100%,420px);height:auto}

/* HOURS BAND */
.hours-band{padding:clamp(80px,10vh,140px) 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--ink2)}
.hours-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,4vw,60px);align-items:start}
@media(max-width:760px){.hours-grid{grid-template-columns:1fr}}
.hour-k{font-family:var(--mono);font-size:9px;letter-spacing:.32em;color:var(--sand);text-transform:uppercase;margin-bottom:16px}
.hour-big{font-family:var(--serif);font-size:clamp(40px,5vw,72px);font-weight:300;line-height:1;color:var(--bone);letter-spacing:-.01em}
.hour-big em{font-style:italic;color:var(--sand);font-size:.65em}
.hour-note{margin-top:14px;font-size:13px;color:var(--muted);line-height:1.7;font-weight:300;max-width:280px}

/* MEMBERSHIPS */
.mem-section{padding:clamp(120px,16vh,200px) 0}
.mem-head{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;margin-bottom:80px}
@media(max-width:900px){.mem-head{grid-template-columns:1fr}}

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ── CURSOR ── */
function initCursor() {
  const dot = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  });
  function lerp(a,b,n){return a+(b-a)*n}
  function tick(){
    rx=lerp(rx,mx,.12); ry=lerp(ry,my,.12);
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(tick);
  }
  tick();
}

/* ── SCROLL PROGRESS ── */
function initProgress() {
  const bar = document.getElementById('progress');
  window.addEventListener('scroll',()=>{
    const pct = window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
    bar.style.width=pct+'%';
  });
}

/* ── PARALLAX ── */
function useParallax(strength=0.25) {
  const ref = useRef();
  useEffect(()=>{
    const el = ref.current; if(!el) return;
    const img = el.querySelector('img'); if(!img) return;
    function onScroll(){
      const rect=el.getBoundingClientRect();
      const visible = rect.top < window.innerHeight && rect.bottom > 0;
      if(!visible) return;
      const center=(rect.top+rect.height/2)-window.innerHeight/2;
      img.style.transform=`translateY(${center*strength}px) scale(1.1)`;
    }
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
    return ()=>window.removeEventListener('scroll',onScroll);
  },[strength]);
  return ref;
}

/* ── REVEAL ON SCROLL ── */
function useReveal() {
  useEffect(()=>{
    const io = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
    },{threshold:0.1,rootMargin:'0px 0px -50px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}

/* ── COUNT UP ── */
function CountUp({target, duration=1800}) {
  const [val,setVal]=useState(0);
  const ref=useRef();
  useEffect(()=>{
    const io=new IntersectionObserver(entries=>{
      if(!entries[0].isIntersecting) return;
      io.disconnect();
      const start=performance.now();
      function step(now){
        const p=Math.min((now-start)/duration,1);
        const ease=1-Math.pow(1-p,4);
        setVal(Math.floor(ease*target));
        if(p<1) requestAnimationFrame(step);
        else setVal(target);
      }
      requestAnimationFrame(step);
    },{threshold:0.5});
    io.observe(ref.current);
    return ()=>io.disconnect();
  },[target,duration]);
  return <span ref={ref}>{val}</span>;
}

/* ── BOOKING MODAL ── */

        </div>
        <div className="modal-row">

            <label>Tee Time</label>

            </select>
          </div>
          <div className="modal-field">
            <label>Holes</label>

              <option>18 holes</option>

              <option>9 holes</option>
            </select>

        </div>
        <div className="modal-field">

      </div>
    </div>

}

/* ── TWEAKS ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroParallax": 0.25,
  "fontScale": 1,
  "auroraOpacity": 0.5
}/*EDITMODE-END*/;

function Tweaks({open}) {
  const [vals,setVals]=useState(TWEAK_DEFAULTS);
  return (
    <div className={`tweaks-panel ${open?'open':''}`}>

        <input type="range" min={0} max={0.6} step={0.05} value={vals.heroParallax}

      </div>
      <div className="tweak-row">

        <input type="range" min={0} max={1} step={0.1} value={vals.auroraOpacity}

        }}>

          <option value="cool">Nordic blue</option>
          <option value="green">Lichen green</option>
        </select>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [modalOpen, setModalOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useReveal();

  useEffect(()=>{
    initCursor();
    initProgress();

    // Tweaks toggle
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  return (
    <>
      <Nav onBook={()=>setModalOpen(true)}/>
      <Hero onBook={()=>setModalOpen(true)}/>
      <Marquee/>
      <About/>
      <Architects/>
      <PhotoBanner/>
      <Awards/>
      <Gallery/>
      <Location/>
      <Hours/>
      <Midnight/>
      <Memberships/>
      <Fees/>
      <Hole/>
      <FinalCTA onBook={()=>setModalOpen(true)}/>
      <Footer/>
      <BookingModal open={modalOpen} onClose={()=>setModalOpen(false)}/>
      <Tweaks open={tweaksOpen}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
